version: "3.8"

services:
  novad:
    build: .
    ports:
      - "8642:8642"
    volumes:
      - novad-data:/data
      - ./novad.toml:/etc/novad/novad.toml:ro
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8642/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  dashboard:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      novad:
        condition: service_healthy

volumes:
  novad-data:
